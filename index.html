<!DOCTYPE html>
<html>
<head>
    <title>My Static Web App with SSO</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #0078d4;
            color: white;
            border: none;
            border-radius: 4px;
        }
        .logout-btn {
            background-color: #d13438;
        }
        .user-info {
            background-color: #f0f0f0;
            padding: 20px;
            border-radius: 8px;
            display: inline-block;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div id="app">
        <h1>My Static Web App with SSO</h1>
        <div id="auth-status">
            <p>Loading...</p>
        </div>
    </div>

    <script>
        async function checkAuth() {
            const authDiv = document.getElementById('auth-status');
            
            try {
                const response = await fetch('/.auth/me');
                const data = await response.json();
                
                if (data && data.length > 0 && data[0].user_id) {
                    const user = data[0];
                    const userEmail = user.user_details?.user_principal_name || 
                                     user.user_details?.email || 
                                     user.user_id;
                    const userName = user.user_details?.name || userEmail;
                    
                    authDiv.innerHTML = `
                        <div class="user-info">
                            <h2>Welcome, ${userName}!</h2>
                            <p><strong>Email:</strong> ${userEmail}</p>
                            <p><strong>User ID:</strong> ${user.user_id}</p>
                            <p>You are successfully authenticated.</p>
                            <a href="/.auth/logout"><button class="logout-btn">Logout</button></a>
                        </div>
                    `;
                } else {
                    authDiv.innerHTML = `
                        <div>
                            <p>Please log in to access the application</p>
                            <a href="/.auth/login/aad"><button>Login with SSO</button></a>
                        </div>
                    `;
                }
            } catch (error) {
                authDiv.innerHTML = `
                    <div>
                        <p>Please log in to access the application</p>
                        <a href="/.auth/login/aad"><button>Login with SSO</button></a>
                    </div>
                `;
            }
        }
        
        checkAuth();
    </script>
</body>
</html>
